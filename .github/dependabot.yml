version: 2

# Grouping matters here: without it Dependabot opens one PR per package, which is how
# 13 of them piled up. Patch and minor updates are now batched into a single PR per
# ecosystem and auto-merge themselves (.github/workflows/dependabot-auto-merge.yml).
# A major bump still gets its own PR and waits for a human.
updates:
  # Backend NuGet packages (the solution at the repo root).
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
    groups:
      nuget-safe:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      # Swashbuckle 7+ moves onto Microsoft.OpenApi v2, which drops the
      # Microsoft.OpenApi.Models namespace the API services use for the JWT
      # Swagger setup (build break, CS0234 — see closed #60). Defer the major
      # migration to its own task; keep taking Swashbuckle minor/patch.
      - dependency-name: "Swashbuckle.AspNetCore"
        update-types: ["version-update:semver-major"]

  # Frontend npm packages.
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
    groups:
      npm-safe:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # The GitHub Actions the workflows pin.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions-safe:
        patterns: ["*"]
        update-types: ["minor", "patch"]
