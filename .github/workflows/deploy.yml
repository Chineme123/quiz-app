name: Deploy

# Deploys to Railway on a push to main. main is only ever reached through a PR that
# passed the required CI checks (branch protection), so a push here is already
# CI-verified. Inert until the RAILWAY_TOKEN secret is set.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'frontend/**'
      - 'design-system/**'
      - '**/Dockerfile'
      - '.dockerignore'
  workflow_dispatch:

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN not set — skipping deploy."
            echo "Create a Railway project token (Project → Settings → Tokens) and add it"
            echo "as the repo secret RAILWAY_TOKEN to enable continuous deployment."
            exit 0
          fi
          npm i -g @railway/cli
          # One service now: the Quiztin host serves /api and the SPA (spec 0007).
          railway up --service quiztin --ci
