version: '3.4'

services:
  postgres:
    image: postgres:17
    container_name: quizapp-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  authservice:
    image: ${DOCKER_REGISTRY-}authservice
    build:
      context: .
      dockerfile: src/Services/AuthService/AuthService.API/Dockerfile
    ports:
      - "5001:8080"
    depends_on:
      - postgres
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=authdb;Username=postgres;Password=postgres

  userservice:
    image: ${DOCKER_REGISTRY-}userservice
    build:
      context: .
      dockerfile: src/Services/UserService/UserService.API/Dockerfile
    ports:
      - "5002:8080"
    depends_on:
      - postgres
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=userdb;Username=postgres;Password=postgres

  quizservice:
    image: ${DOCKER_REGISTRY-}quizservice
    build:
      context: .
      dockerfile: src/Services/QuizService/QuizService.API/Dockerfile
    ports:
      - "5224:8080"
    depends_on:
      - postgres
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=quizdb;Username=postgres;Password=postgres
      - ASPNETCORE_ENVIRONMENT=Development

  resultservice:
    image: ${DOCKER_REGISTRY-}resultservice
    build:
      context: .
      dockerfile: src/Services/ResultService/ResultService.API/Dockerfile
    ports:
      - "5004:8080"
    depends_on:
      - postgres
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=resultdb;Username=postgres;Password=postgres

  notificationservice:
    image: ${DOCKER_REGISTRY-}notificationservice
    build:
      context: .
      dockerfile: src/Services/NotificationService/NotificationService.API/Dockerfile
    ports:
      - "5005:8080"
    depends_on:
      - postgres
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=notificationdb;Username=postgres;Password=postgres

volumes:
  pgdata:
