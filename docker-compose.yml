# Local dev stack (spec 0007). `docker compose up` brings up Postgres and the single
# Quiztin app, which owns /api and serves the SPA. For hot reload the SPA can instead
# run on the host Vite server, proxying /api to the app.
#
# The app listens on 8080. First `up` runs docker/postgres-init.sql, which creates the
# `quiztin` database; the app migrates its two schemas (identity, quiz) on startup.

services:
  postgres:
    image: postgres:17
    container_name: quiztin-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 15

  app:
    image: ${DOCKER_REGISTRY-}quiztin
    build:
      context: .
      dockerfile: src/Quiztin.Api/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RUN_MIGRATIONS_ON_STARTUP=true
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=quiztin;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}
      - JwtSettings__Secret=${JWT_SECRET:-local-dev-only-insecure-secret-change-me}
      # Set these to enable the live Claude feedback path; otherwise the deterministic
      # fallback runs and the loop still works end to end.
      - Anthropic__ApiKey=${ANTHROPIC_API_KEY:-}
      - Feedback__AiEnabled=${FEEDBACK_AI_ENABLED:-false}

volumes:
  pgdata:
